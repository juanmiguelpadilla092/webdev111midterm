<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster | Industrial Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="barcode-logo">
                <div class="bars">
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
                <p>STOCKMASTER</p>
            </div>
        </div>

        <nav class="nav-menu">
            <button class="nav-btn active" id="btn-stock" onclick="showTab('stock')">STOCK</button>
            <button class="nav-btn" id="btn-suppliers" onclick="showTab('suppliers')">SUPPLIERS</button>
            <button class="nav-btn" id="btn-orders" onclick="showTab('orders')">ORDERS</button>
        </nav>

        <div class="sidebar-footer">
            <button class="info-btn" onclick="toggleReports()">REPORTS</button>
        </div>
    </aside>

    <main class="viewport">
        <header class="top-bar">
            <div class="status-indicator">
                <span class="dot"></span> SYSTEM ONLINE / WAREHOUSE_A
            </div>
            <div class="user-id">ID: 2026-RLND</div>
        </header>

        <section class="dashboard-content">
            <div class="stats-row">
                <div class="metric-box">
                    <label>TOTAL_SKU</label>
                    <div class="number">1,284</div>
                </div>
                <div class="metric-box warning">
                    <label>LOW_STOCK</label>
                    <div class="number">014</div>
                </div>
                <div class="metric-box">
                    <label>PENDING_ORDERS</label>
                    <div class="number">008</div>
                </div>
                <div class="metric-box">
                    <label>DAILY_TURNOVER</label>
                    <div class="number">₱142K</div>
                </div>
            </div>

            <div id="main-view-container" class="panel">
                <div class="panel-header">
                    <h3 id="view-title">CURRENT_INVENTORY</h3>
                    <div class="actions">
                        <input type="text" placeholder="SCAN_BARCODE..." id="scanner">
                        <button class="action-btn" onclick="addItemModal()">ADD_NEW</button>
                    </div>
                </div>
                <div class="scroll-table">
                    <table id="data-table">
                        <thead id="table-head">
                            </thead>
                        <tbody id="table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="reports-overlay" class="overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>ANALYTICS_REPORT</h2>
                <button class="close-btn" onclick="toggleReports()">[X]</button>
            </div>
            <div class="report-data">
                <div class="report-grid">
                    <div class="report-item">
                        <label>FASTEST_MOVING</label>
                        <p>DDR4 RAM (B-08)</p>
                    </div>
                    <div class="report-item">
                        <label>DEAD_STOCK_VALUE</label>
                        <p>₱12,400.00</p>
                    </div>
                    <div class="report-item">
                        <label>SUPPLIER_SCORE</label>
                        <p>98.2% ON-TIME</p>
                    </div>
                </div>
                <div class="barcode-footer">
                    <span>*REPORT-ID-2026-03-20*</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
