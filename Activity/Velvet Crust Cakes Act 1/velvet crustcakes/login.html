<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Velvet Crustcakes</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">Velvet <span class="highlight">Crustcakes</span></span>
            </div>
            <ul class="nav-links">
                <li><a href="menu.html">MENU</a></li>
                <li><a href="locations.html">LOCATIONS</a></li>
                <li><a href="promos.html">PROMOS</a></li>
                <li><a href="franchising.html">FRANCHISING</a></li>
                <li><a href="order.html">ORDER ONLINE</a></li>
                <li><a href="login.html">LOGIN</a></li>
                <li><a href="cart.html">CART</a></li>
                <li><a href="#" class="search-icon">🔍</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h2 class="login-title">WELCOME BACK</h2>
            <p class="login-subtitle">Login to your account to start ordering</p>

            <form action="javascript:void(0);" class="login-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required id="userEmail">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required id="userPass">
                </div>

                <button type="submit" class="login-btn" onclick="showCardHover()">LOGIN</button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="#">Sign Up Here</a></p>
            </div>
        </div>
    </div>

    <div id="cardOverlay" class="overlay">
        <div class="card-modal">
            <span class="close-modal" onclick="closeCardHover()">&times;</span>
            <h2 class="modal-title">LOYALTY CARD</h2>
            <p class="modal-subtitle">Please enter your Velvet Crustcakes card number</p>
            
            <div class="input-group">
                <label>Card Number</label>
                <input type="text" placeholder="XXXX-XXXX-XXXX-XXXX" id="cardNumber">
            </div>
            
            <button class="submit-card-btn" onclick="processLogin()">VERIFY & LOGIN</button>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
